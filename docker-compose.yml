services:
  postgres:
    image: postgres:16
    container_name: shiftplanner_postgres
    environment:
      POSTGRES_DB: shiftplanner
      POSTGRES_USER: shiftplanner_user
      POSTGRES_PASSWORD: shiftplanner_password
    expose:
      - "5432"
    volumes:
      - shiftplanner_postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftplanner_user -d shiftplanner"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shiftplanner_backend
    environment:
      DATABASE_URL: postgresql+psycopg://shiftplanner_user:shiftplanner_password@postgres:5432/shiftplanner
      # DATABASE_URL: postgresql+psycopg://postgres:1792@localhost:5432/shiftplanner_test
      FRONTEND_ORIGINS: http://localhost:5173,https://shiftplanner.online
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://shiftplanner.online/api
    container_name: shiftplanner_frontend
    environment:
      VITE_API_URL: https://shiftplanner.online/api
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: shiftplanner_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  shiftplanner_postgres_data:
